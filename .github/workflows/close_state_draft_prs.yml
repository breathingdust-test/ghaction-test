name: "Close Stale Draft PRs"
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  close-stale-drafts:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale draft PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Calculate the date 60 days ago in ISO format (YYYY-MM-DD)
          DATE=2026-04-20

          echo "Finding draft PRs updated before $DATE..."

          # Use gh search prs to find open draft PRs matching the criteria
          PRS=$(gh search prs \
            --state open \
            --repo $GH_REPO \
            --draft \
            --updated "<$DATE" \
            --json number \
            -q '.[].number')

          if [ -z "$PRS" ]; then
            echo "No stale draft PRs found."
            exit 0
          fi

          for PR in $PRS; do
            echo "Processing PR #$PR"
            gh pr comment $PR -b "This draft pull request is being closed because it has been inactive for _60 days_ ⏳. This helps our maintainers find and focus on the active contributions.\n\nIf you would like to continue working on this, please reopen the pull request and mark it as ready for review when complete. Thank you!"
            gh pr close $PR
          done
